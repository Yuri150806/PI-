<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etec - Ranking e Perfil</title>
    <link rel="stylesheet" href="ranking.css">
</head>
<body>

    <header class="topo">
        <img src="Image/LogoEtec2.png" alt="Logo Etec" class="logo">
        <div class="menu-hamburguer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </header>

    <main class="conteudo-principal">
        <div class="container-itens">
            <div class="card-item">
                <div class="foto-item">
                    <img src="Image/bequer.png" alt="Frasco">
                </div>
            </div>

            <div class="card-item">
                <div class="foto-item">
                    <img src="Image/bequer.png" alt="Frasco">
                </div>
            </div>

            <div class="card-item">
                <div class="foto-item">
                    <img src="Image/bequer.png" alt="Frasco">
                </div>
            </div>
        </div>

        <div class="card-ranking">
            <div class="coroa">👑</div>
            <h2>Ranking</h2>
            <ul class="lista-ranking">
                <li>1. xxx</li>
                <li>2. xxx</li>
                <li>3. xxx</li>
                <li>4. xxx</li>
                <li>5. xxx</li>
                <li>6. xxx</li>
                <li>7. xxx</li>
                <li>8. xxx</li>
                <li>9. xxx</li>
                <li>10. xxx</li>
            </ul>
        </div>

        <div class="card-perfil">
            <div class="foto-usuario">
                <img src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" alt="User">
            </div>
            <div class="info-usuario">
                <p>NOME</p>
                <p>RANKING: X</p>
                <br>
                <p>RODADAS EM X: X</p>
                <p>RODADAS EM Y: X</p>
                <p>RODADAS EM Z: X</p>
            </div>
        </div>
    </main>

    <footer class="rodape"></footer>
</body>
</html>
